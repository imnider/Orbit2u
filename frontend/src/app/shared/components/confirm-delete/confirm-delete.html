<div class="confirm-dialog">
  <div class="confirm-dialog__icon">
    <mat-icon>delete_outline</mat-icon>
  </div>

  <h2 class="confirm-dialog__title">Eliminar {{ data.entity }}</h2>

  <p class="confirm-dialog__message">
    ¿Estás seguro de que quieres eliminar este {{ data.entity }}? Esta acción no se puede deshacer.
  </p>

  <div class="confirm-dialog__actions">
    <button class="confirm-dialog__btn confirm-dialog__btn--cancel" (click)="ref.close(false)">
      Cancelar
    </button>
    <button class="confirm-dialog__btn confirm-dialog__btn--danger" (click)="ref.close(true)">
      <mat-icon>delete</mat-icon>
      Eliminar
    </button>
  </div>
</div>
