<div class="dialog-overlay" (click)="skip()">
  <div class="dialog" (click)="$event.stopPropagation()">
    <div class="dialog__header">
      <mat-icon class="dialog__header-icon">local_offer</mat-icon>
      @if (data?.mode === 'video') {
        <h2>Etiquetas del video</h2>
        <p>Selecciona las etiquetas que describen tu video.</p>
      } @else {
        <h2>¿En qué estás interesado?</h2>
        <p>Selecciona temas para personalizar tu feed.</p>
      }
    </div>

    @if (loading()) {
      <div class="dialog__loading">
        <span class="loader"></span>
      </div>
    } @else {
      <div class="dialog__tags">
        @for (tag of tags(); track tag.tagId) {
          <button
            class="tag-chip"
            [class.tag-chip--selected]="isSelected(tag.tagId)"
            (click)="toggle(tag)"
          >
            @if (isSelected(tag.tagId)) {
              <mat-icon>check</mat-icon>
            }
            {{ tag.displayName }}
          </button>
        }
      </div>
    }

    <div class="dialog__footer">
      <button class="dialog__skip-btn" (click)="skip()">
        {{ data?.mode === 'video' ? 'Cancelar' : 'Omitir' }}
      </button>
      <button class="dialog__confirm-btn" (click)="confirm()">Listo</button>
    </div>
  </div>
</div>
