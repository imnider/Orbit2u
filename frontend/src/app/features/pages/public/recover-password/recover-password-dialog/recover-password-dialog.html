<div class="recover-dialog">
  <h2>Recuperar contraseña</h2>

  <p class="recover-dialog__text">
    Ingresa tu correo electrónico y te enviaremos un código de recuperación.
  </p>

  @if (error()) {
    <div class="alert-error">
      {{ error() }}
    </div>
  }

  @if (success()) {
    <div class="alert-success">
      {{ success() }}
    </div>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="field-group">
      <label class="field-label">Correo electrónico</label>

      <input
        class="field-input"
        type="email"
        formControlName="email"
        placeholder="correo@ejemplo.com"
      />
    </div>

    <div class="actions">
      <button type="button" class="secondary-btn" (click)="close()">Cancelar</button>

      <button type="submit" class="submit-btn" [disabled]="loading() || form.invalid">
        {{ loading() ? 'Enviando...' : 'Enviar código' }}
      </button>
    </div>
  </form>
</div>
