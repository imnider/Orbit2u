<div class="login-page">
  <div class="space-background"></div>
  
  <nav class="login-nav">
    <a routerLink="/" class="exit-button">
      <i class="fa-solid fa-chevron-left"></i>
      <span>Volver</span>
    </a>
  </nav>

  <div class="login-container">
    <div class="login-card">
      <header class="login-header">
        <div class="logo-wrapper">
          <img src="/images/logo-orbit.png" alt="Orbit2u">
        </div>
        <h1>Orbit<span>2u</span></h1>
        <p>Conecta con tu universo digital</p>
      </header>

      <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
        <div class="field-group">
          <label>Email</label>
          <div class="input-wrapper">
            <input type="email" formControlName="email" placeholder="usuario@orbit2u.com">
          </div>
          @if (getErrorMessage('email')) {
            <span class="field-error">{{ getErrorMessage('email') }}</span>
          }
        </div>

        <div class="field-group">
          <label>Contraseña</label>
          <div class="input-wrapper">
            <input [type]="showPassword() ? 'text' : 'password'" formControlName="password" placeholder="••••••••">
            <button type="button" class="toggle-btn" (click)="togglePassword()">
              <i [class]="showPassword() ? 'fa-solid fa-eye-slash' : 'fa-solid fa-eye'"></i>
            </button>
          </div>
          @if (getErrorMessage('password')) {
            <span class="field-error">{{ getErrorMessage('password') }}</span>
          }
        </div>

        @if(error()) {
          <div class="alert-error">{{ error() }}</div>
        }

        <button type="submit" class="submit-btn" [disabled]="loading()">
          @if(loading()) {
            <span class="loader"></span>
          } @else {
            <span>Iniciar Sesión</span>
          }
        </button>
      </form>

      <footer class="login-footer">
        <a routerLink="/register">¿No tienes cuenta? <span>Regístrate</span></a>
        <a routerLink="/recover-password" class="forgot-link">Recuperar acceso</a>
      </footer>
    </div>
  </div>
</div>
