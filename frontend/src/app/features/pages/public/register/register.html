<div class="login-page">
  <div class="space-background"></div>

  <nav class="login-nav">
    <a routerLink="/login" class="exit-button">
      <i class="fa-solid fa-chevron-left"></i>
      <span>Volver</span>
    </a>
  </nav>

  <div class="login-container">
    <div class="login-card">
      <header class="login-header">
        <div class="logo-wrapper">
          <img src="/images/logo-orbit.png" alt="Orbit2u" />
        </div>
        <h1>Únete a Orbit</h1>
        <p>Verifica tu correo para empezar</p>
      </header>

      @if (!emailSent()) {
        <form [formGroup]="form" (ngSubmit)="onSubmit()" class="login-form">
          <div class="field-group">
            <label>Correo Electrónico</label>
            <div class="input-wrapper">
              <input
                type="email"
                formControlName="email"
                placeholder="nombre@ejemplo.com"
              />
            </div>
            @if (getEmailError()) {
              <span class="field-error">{{ getEmailError() }}</span>
            }
          </div>

          @if (error()) {
            <div class="alert-error">{{ error() }}</div>
          }

          <button type="submit" class="submit-btn" [disabled]="loading()">
            {{ loading() ? 'Enviando...' : 'Enviar verificación' }}
          </button>
        </form>
      } @else {
        <div class="email-sent-feedback">
          <i class="fa-solid fa-envelope-circle-check"></i>
          <p>
            Te enviamos un enlace a
            <strong>{{ form.getRawValue().email }}</strong>.
            Revisá tu bandeja de entrada para continuar.
          </p>
        </div>
      }
    </div>
  </div>
</div>
