<div class="upload-video-page">
  <div class="upload-video-topnav">
    <button class="back-btn" (click)="goBack()">
      <mat-icon>arrow_back</mat-icon>
      <span>Volver</span>
    </button>

    <h1>
      {{ isEditMode() ? 'Editar video' : 'Subir video' }}
    </h1>
  </div>

  <div class="upload-video-layout">
    <!-- IZQUIERDA -->
    <div class="upload-video-files">
      <!-- SOLO upload video si NO es edit -->
      @if (!isEditMode()) {
        <div class="upload-zone" [class.upload-zone--done]="form.get('videoUrl')?.value">
          <mat-icon class="upload-zone__icon">cloud_upload</mat-icon>
          <span class="upload-zone__label">Seleccionar video</span>

          <input type="file" hidden />
        </div>
      }

      <!-- thumbnail (ambos casos) -->
      <div class="thumb-upload">
        <span class="thumb-upload__label">Miniatura</span>

        <div class="thumb-upload__zone" (click)="thumbInput.click()">
          @if (uploadingThumb()) {
            <div class="upload-zone__loading">
              <span class="loader"></span>
            </div>
          } @else if (thumbPreview()) {
            <img [src]="thumbPreview()" />
          } @else {
            <mat-icon>add_photo_alternate</mat-icon>
            <span>Subir miniatura</span>
          }

          <input #thumbInput type="file" hidden (change)="onThumbSelected($event)" />
        </div>
      </div>
    </div>

    <!-- DERECHA -->
    <div class="upload-video-meta">
      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="field-group">
          <label>Título</label>
          <div class="input-wrapper">
            <input type="text" formControlName="title" />
          </div>
        </div>

        <div class="field-group">
          <label>Descripción</label>
          <div class="input-wrapper">
            <textarea rows="4" formControlName="description"></textarea>
          </div>
        </div>

        <div class="field-group">
          <label>Visibilidad</label>

          <div class="visibility-options">
            <label
              class="visibility-option"
              [class.visibility-option--active]="form.get('videoAccessibilityId')?.value === 1"
            >
              <input type="radio" formControlName="videoAccessibilityId" [value]="1" hidden />
              <mat-icon>public</mat-icon>
              <span>Público</span>
            </label>

            <label
              class="visibility-option"
              [class.visibility-option--active]="form.get('videoAccessibilityId')?.value === 2"
            >
              <input type="radio" formControlName="videoAccessibilityId" [value]="2" hidden />
              <mat-icon>lock</mat-icon>
              <span>Privado</span>
            </label>
          </div>
        </div>

        @if (error()) {
          <div class="alert-error">{{ error() }}</div>
        }

        <button type="submit" class="submit-btn" [disabled]="loading() || uploadingThumb()">
          @if (loading()) {
            <span class="loader"></span>
          } @else {
            <span>
              {{ isEditMode() ? 'Guardar cambios' : 'Publicar video' }}
            </span>
          }
        </button>
      </form>
    </div>
  </div>
</div>
