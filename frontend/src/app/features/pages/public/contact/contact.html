<div class="contact-page">
  <section class="contact-hero">
    <h1 class="contact-hero__title">Contáctanos</h1>
    <p class="contact-hero__sub">¿Tienes preguntas o sugerencias? Estamos para ayudarte.</p>
  </section>

  <div class="contact-cards">
    <div class="contact-card">
      <div class="contact-card__icon-wrap">
        <mat-icon>mail_outline</mat-icon>
      </div>
      <div class="contact-card__body">
        <span class="contact-card__label">Correo electrónico</span>
        <span class="contact-card__value">{{ email }}</span>
      </div>
      <button
        class="contact-card__action"
        (click)="copyEmail()"
        [matTooltip]="emailCopied() ? '¡Copiado!' : 'Copiar correo'"
      >
        <mat-icon>{{ emailCopied() ? 'check' : 'content_copy' }}</mat-icon>
      </button>
    </div>

    <div class="contact-card">
      <div class="contact-card__icon-wrap">
        <mat-icon>phone_outline</mat-icon>
      </div>
      <div class="contact-card__body">
        <span class="contact-card__label">Teléfono</span>
        <span class="contact-card__value">{{ phone }}</span>
      </div>
    </div>
  </div>

  <section class="contact-section">
    <h2 class="contact-section__title">Redes sociales</h2>
    <div class="contact-socials">
        <a href="https://instagram.com/" target="_blank" rel="noopener noreferrer" aria-label="Instagram">
            <i class="fa-brands fa-instagram"></i>
        </a>
        <a href="https://linkedin.com/in/tu-perfil" target="_blank" rel="noopener noreferrer" aria-label="LinkedIn">
            <i class="fa-brands fa-linkedin"></i>
        </a>
        <a href="https://github.com/imnider/Orbit2u" target="_blank" rel="noopener noreferrer" aria-label="GitHub">
            <i class="fa-brands fa-github"></i>
        </a>
    </div>
  </section>
</div>
